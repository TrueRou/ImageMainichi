name: Crawl Images

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0:00 执行
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: TrueRou/ImageMainichi/packages/action@main

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: crawl new images [skip ci]"
          git push
