name: 'ImageMainichi Crawl'
description: 'Load crawl rules from rules/*.json, download images, and update the public manifest.json'
inputs:
  max-images:
    description: 'Maximum number of images to download per rule execution'
    default: '10'
  keep-max:
    description: 'Maximum total images to keep in the repo (FIFO eviction)'
    default: '200'
runs:
  using: 'node20'
  main: 'dist/index.js'
